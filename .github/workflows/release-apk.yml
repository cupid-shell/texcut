name: Build & Release APK

# Builds the texcut release APK on GitHub's runners (which have the Android SDK
# and full network access) and publishes it as a GitHub Release asset.
#
# Triggers:
#   - pushing a tag like v1.0.0  -> builds and creates/updates that release
#   - manual "Run workflow"      -> builds and releases under the given tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - name: Resolve tag
        id: tag
        run: echo "value=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/texcut-${{ steps.tag.outputs.value }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: texcut-apk
          path: dist/*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: texcut ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: dist/*.apk
